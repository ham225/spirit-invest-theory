name: 毎日データ収集+バックテスト更新

# 平日 日本時間18:30 (UTC 09:30) に自動実行 + 手動実行もできる
on:
  schedule:
    - cron: "30 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonを用意
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ライブラリを導入
        run: pip install -r requirements.txt

      - name: 市場データ+理論シグナルを記録
        run: python fetch_data.py

      - name: バックテストレポートを更新
        run: python backtest.py

      - name: note投稿用の記事を生成
        run: python generate_article.py

      - name: 自動更新サイトを再生成
        run: python build_site.py

      - name: 変更をコミットして反映
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data insights docs
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "自動記録: $(date -u +%Y-%m-%d)"
            git push
          fi
