name: Layer2過去検証(手動実行)

# 手動実行専用。日経平均の長期データでLayer2該当年/非該当年を機械比較し、
# insights/layer2_history.md を再生成してコミットする。
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  history:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonを用意
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ライブラリを導入
        run: pip install -r requirements.txt

      - name: Layer2過去検証を実行
        run: python layer2_history.py

      - name: 変更をコミットして反映
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add insights/layer2_history.md
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "Layer2過去検証レポートを更新"
            git push
          fi
